<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026年度 情報セキュリティ・個人情報保護 理解度チェック｜株式会社トレスタシステム</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; background: #f0f4f8; color: #1a1a2e; line-height: 1.7; }
  header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 32px 20px; text-align: center; }
  header .year-badge { display: inline-block; background: #3a7bd5; font-size: 0.85em; font-weight: bold; padding: 3px 14px; border-radius: 99px; margin-bottom: 10px; letter-spacing: 0.05em; }
  header h1 { font-size: 1.4em; font-weight: bold; margin-bottom: 8px; }
  header p { font-size: 0.9em; opacity: 0.85; }
  .container { max-width: 760px; margin: 0 auto; padding: 24px 16px 60px; }
  .progress-bar-wrap { background: #dde3ed; border-radius: 99px; height: 8px; margin: 20px 0 4px; }
  .progress-bar { background: #3a7bd5; height: 8px; border-radius: 99px; transition: width 0.4s; width: 0%; }
  .progress-label { font-size: 0.82em; color: #666; text-align: right; margin-bottom: 20px; }

  /* Quiz cards */
  .q-card { background: white; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 28px; overflow: hidden; display: none; }
  .q-card.active { display: block; }
  .q-header { background: #3a7bd5; color: white; padding: 14px 20px; font-size: 0.85em; font-weight: bold; display: flex; justify-content: space-between; }
  .q-body { padding: 24px 20px 20px; }
  .q-text { font-size: 1.05em; font-weight: bold; margin-bottom: 20px; }
  .choice { display: flex; align-items: flex-start; gap: 12px; padding: 13px 16px; border: 2px solid #e0e6f0; border-radius: 10px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; font-size: 0.97em; }
  .choice:hover { border-color: #3a7bd5; background: #f0f5ff; }
  .choice.correct { border-color: #27ae60; background: #e8f8f0; }
  .choice.wrong { border-color: #e74c3c; background: #fdf0ef; }
  .choice-label { font-weight: bold; color: #3a7bd5; min-width: 22px; }
  .choice.correct .choice-label { color: #27ae60; }
  .choice.wrong .choice-label { color: #e74c3c; }
  .explanation { display: none; margin-top: 18px; padding: 16px; background: #f7f9fc; border-left: 4px solid #3a7bd5; border-radius: 0 8px 8px 0; font-size: 0.93em; }
  .explanation.show { display: block; }
  .explanation .result-label { font-weight: bold; font-size: 1em; margin-bottom: 6px; }
  .correct-label { color: #27ae60; }
  .wrong-label { color: #e74c3c; }
  .btn-next { display: block; margin: 18px auto 0; padding: 12px 36px; background: #3a7bd5; color: white; border: none; border-radius: 99px; font-size: 1em; font-weight: bold; cursor: pointer; transition: background 0.2s; }
  .btn-next:hover { background: #2868c0; }
  .btn-next:disabled { background: #aab8d0; cursor: default; }

  /* Result screen */
  #result-screen { display: none; }
  .result-card { background: white; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 36px 24px; text-align: center; margin-bottom: 20px; }
  .score-circle { width: 130px; height: 130px; border-radius: 50%; background: linear-gradient(135deg, #3a7bd5, #1a1a2e); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 24px; }
  .score-num { font-size: 2.4em; font-weight: bold; line-height: 1; }
  .score-denom { font-size: 0.9em; opacity: 0.85; }
  #result-screen h2 { font-size: 1.3em; margin-bottom: 10px; }
  #result-message { color: #555; font-size: 0.97em; margin-bottom: 28px; }
  .btn-retry { padding: 12px 40px; background: #f0f4f8; color: #444; border: 2px solid #dde3ed; border-radius: 99px; font-size: 0.95em; font-weight: bold; cursor: pointer; margin-top: 8px; }
  .btn-retry:hover { background: #e0e6f0; }

  /* Email section */
  .email-card { background: white; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 28px 24px; margin-bottom: 20px; }
  .email-card h3 { font-size: 1.05em; font-weight: bold; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .email-card .subtitle { font-size: 0.85em; color: #888; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 0.88em; font-weight: bold; color: #444; margin-bottom: 6px; }
  .required-badge { display: inline-block; background: #e74c3c; color: white; font-size: 0.75em; padding: 1px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
  .optional-badge { display: inline-block; background: #888; color: white; font-size: 0.75em; padding: 1px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
  .form-group input { width: 100%; padding: 11px 14px; border: 2px solid #e0e6f0; border-radius: 8px; font-size: 0.97em; font-family: inherit; transition: border-color 0.2s; }
  .form-group input:focus { outline: none; border-color: #3a7bd5; }
  .send-to-box { background: #f7f9fc; border: 1px solid #e0e6f0; border-radius: 8px; padding: 12px 14px; font-size: 0.83em; color: #555; margin-bottom: 20px; line-height: 1.8; }
  .send-to-box strong { color: #333; display: block; margin-bottom: 4px; }
  .btn-send { display: block; width: 100%; padding: 14px; background: #3a7bd5; color: white; border: none; border-radius: 10px; font-size: 1.05em; font-weight: bold; cursor: pointer; transition: background 0.2s; }
  .btn-send:hover { background: #2868c0; }
  .btn-send:disabled { background: #aab8d0; cursor: default; }
  .send-status { margin-top: 14px; text-align: center; font-size: 0.95em; min-height: 24px; }
  .status-ok { color: #27ae60; font-weight: bold; }
  .status-err { color: #e74c3c; font-weight: bold; }
  .status-ing { color: #3a7bd5; }

  /* Review */
  .review-card { background: white; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 24px; }
  .review-card h3 { font-size: 1em; border-bottom: 2px solid #e0e6f0; padding-bottom: 8px; margin-bottom: 14px; }
  .review-item { display: flex; gap: 10px; font-size: 0.88em; padding: 8px 0; border-bottom: 1px solid #f0f4f8; }
  .review-icon { font-size: 1.1em; min-width: 20px; }
</style>
</head>
<body>
<header>
  <div class="year-badge">2026年度</div>
  <h1>情報セキュリティ・個人情報保護規定<br>理解度チェック（全20問）</h1>
  <p>株式会社トレスタシステム ／ 社員研修用</p>
</header>
<div class="container">
  <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="progress-label" id="progress-label">0 / 20 問</div>
  <div id="quiz-area"></div>

  <div id="result-screen">
    <!-- スコア表示 -->
    <div class="result-card">
      <div class="score-circle">
        <span class="score-num" id="score-num">0</span>
        <span class="score-denom">/ 20 点</span>
      </div>
      <h2 id="result-title"></h2>
      <p id="result-message"></p>
      <button class="btn-retry" onclick="startQuiz()">もう一度挑戦する</button>
    </div>

    <!-- メール送信フォーム -->
    <div class="email-card">
      <h3>📧 結果をメールで送信する</h3>
      <p class="subtitle">お名前を入力して「送信」ボタンを押してください。担当者に自動でメールが届きます。</p>

      <div class="form-group">
        <label>お名前<span class="required-badge">必須</span></label>
        <input type="text" id="sender-name" placeholder="例：山田 太郎" maxlength="40">
      </div>

      <div class="send-to-box">
        <strong>自動送信先（変更不可）</strong>
        k.nakada@tresta-s.jp<br>
        m.nakazawa@tresta-s.jp<br>
        tresta.kyotsu@px-ins.jp
      </div>

      <div class="form-group">
        <label>追加で送りたいメールアドレス<span class="optional-badge">任意</span></label>
        <input type="email" id="extra-email" placeholder="例：sample@example.com">
      </div>

      <button class="btn-send" id="btn-send" onclick="sendResult()">📤 結果を送信する</button>
      <div class="send-status" id="send-status"></div>
    </div>

    <!-- 正誤一覧 -->
    <div class="review-card">
      <h3>問題の正誤一覧</h3>
      <div id="review-items"></div>
    </div>
  </div>
</div>

<script>

const questions = [
  {
    q: "Q1. この規定の目的として正しいものはどれですか？",
    choices: ["社員の業務効率を向上させること", "情報資産・個人情報を適切に保護し、管理体制と手順を定めること", "顧客サービスの品質を向上させること", "社内システム開発を標準化すること"],
    answer: 1,
    exp: "第1条（目的）に「業務上取り扱う情報資産および個人情報を適切に保護するため、情報セキュリティの基本方針ならびに個人情報保護に関する管理体制・手順を定めることを目的とする」と規定されています。"
  },
  {
    q: "Q2. この規定が適用される対象者として含まれないのはどれですか？",
    choices: ["テレワーク（在宅勤務）を行う社員", "業務委託先", "全役員および全社員", "会社とまったく無関係の一般市民"],
    answer: 3,
    exp: "第2条（適用範囲）に、全役員・全社員（正社員・契約社員・パートタイマー等）、テレワークを行う者、業務委託先、その他当社情報資産にアクセスするすべての者が対象と定められています。"
  },
  {
    q: "Q3. 「個人情報」の定義として正しいものはどれですか？",
    choices: ["氏名と電話番号のみ", "会社が保有するすべてのデータ", "氏名・住所・電話番号・メールアドレス等で特定の個人を識別できる情報（他情報との照合で識別できるものを含む）", "生体認証データのみ"],
    answer: 2,
    exp: "第3条（定義）に「氏名・住所・電話番号・メールアドレス等により特定の個人を識別できる情報（他の情報と照合することで識別できるものを含む）」と定義されています。「照合で識別できるもの」が含まれる点が重要です。"
  },
  {
    q: "Q4. 「インシデント」の定義として正しいものはどれですか？",
    choices: ["業務上のミスすべて", "機器の物理的な故障のみ", "顧客からの苦情・クレーム", "個人情報の漏えい・滅失・き損、または情報セキュリティの侵害が発生・またはそのおそれがある事象"],
    answer: 3,
    exp: "第3条（定義）に「個人情報の漏えい・滅失・き損、または情報セキュリティの侵害が発生し、もしくはそのおそれがある事象」と定義されています。「おそれがある」段階もインシデントである点に注意しましょう。"
  },
  {
    q: "Q5. 個人情報保護管理者を任命するのは誰ですか？",
    choices: ["社員全員の多数決", "外部の専門機関", "代表取締役", "総務担当者"],
    answer: 2,
    exp: "第5条第1項に「代表取締役は、個人情報保護管理者を任命し、本規定の実施・運用に関する責任と権限を付与する」と定められています。"
  },
  {
    q: "Q6. 個人情報保護管理者の職務として、この規定に定められていないものはどれですか？",
    choices: ["規定の策定・改訂・周知", "インシデント対応の統括", "社員の給与計算・支払い", "苦情・相談窓口の管理"],
    answer: 2,
    exp: "第5条第2項では、管理者の職務として「規定の策定・改訂・周知」「個人情報の管理・監督」「社員教育・啓発の計画・実施」「苦情・相談窓口の管理」「インシデント対応の統括」が定められています。給与計算は含まれません。"
  },
  {
    q: "Q7. 個人情報の第三者提供について、本人の同意なく提供できる場合として正しいものはどれですか？",
    choices: ["取引先から強く求められた場合", "業務効率化のために必要と経営者が判断した場合", "法令に基づく場合、または人の生命・身体・財産の保護に必要な場合", "提供先が国内企業の場合"],
    answer: 2,
    exp: "第9条に「本人の同意なく、個人情報を第三者に提供しない。ただし、法令に基づく場合または人の生命・身体・財産の保護のために必要な場合はこの限りでない」と定められています。"
  },
  {
    q: "Q8. 本人から個人情報の開示・訂正・削除等の請求があった場合、原則として受付から何営業日以内に対応しなければなりませんか？",
    choices: ["7営業日以内", "14営業日以内", "30営業日以内", "60営業日以内"],
    answer: 1,
    exp: "第10条第1項に「合理的な期間（原則として受付から14営業日以内）に対応する」と定められています。"
  },
  {
    q: "Q9. 苦情・相談窓口の対応時間として規定されているものはどれですか？",
    choices: ["24時間365日対応", "平日 9:00〜18:00", "土日祝日を含む毎日 10:00〜17:00", "平日 8:00〜20:00"],
    answer: 1,
    exp: "第11条第1項に「対応時間：平日 9:00〜18:00」と定められています。"
  },
  {
    q: "Q10. 「最小権限の原則」として規定されているものはどれですか？",
    choices: ["全社員が同じアクセス権限を持つ", "管理者のみが個人情報にアクセスできる", "個人情報へのアクセスは、業務上必要な者に限定する", "外部からのアクセスをすべて禁止する"],
    answer: 2,
    exp: "第12条第1項（組織的安全管理措置）に「個人情報へのアクセスは、業務上必要な者に限定する（最小権限の原則）」と定められています。"
  },
  {
    q: "Q11. 退職・異動時の対応として規定されているものはどれですか？",
    choices: ["退職後1ヶ月以内にアカウントを削除する", "後任者にパスワードを引き継ぐ", "退職者が自分でデータを整理してから返却する", "個人情報へのアクセス権を速やかに削除し、情報・機器を返却させる"],
    answer: 3,
    exp: "第12条第3項に「退職・異動時には、個人情報へのアクセス権を速やかに削除し、情報・機器を返却させる」と定められています。「速やかに」という点が重要で、猶予は設けられていません。"
  },
  {
    q: "Q12. 入社時に全社員に対して行うべきこととして規定されているものはどれですか？",
    choices: ["個人情報保護管理者への就任届", "情報セキュリティ・個人情報保護に関する誓約書の締結", "外部研修機関への参加申込", "セキュリティ試験の合格"],
    answer: 1,
    exp: "第13条第1項（人的安全管理措置）に「入社時に情報セキュリティ・個人情報保護に関する誓約書を締結する」と定められています。"
  },
  {
    q: "Q13. 全社員を対象とした教育・啓発の実施頻度として正しいものはどれですか？",
    choices: ["3年に1回以上", "2年に1回以上", "年1回以上", "月1回以上"],
    answer: 2,
    exp: "第13条第2項に「全役員・全社員を対象に、年1回以上の教育・啓発を実施する」と定められています。この研修がまさにその取り組みです。"
  },
  {
    q: "Q14. 端末の画面ロックについて正しいものはどれですか？",
    choices: ["30分以内に設定する", "任意設定でよい", "5分以内に設定する", "ログアウトのみで十分"],
    answer: 2,
    exp: "第15条（技術的安全管理措置）の端末・デバイス管理に「画面ロック（5分以内）・ストレージ暗号化を設定する」と定められています。"
  },
  {
    q: "Q15. パスワードの基準として正しいものはどれですか？",
    choices: ["数字のみ6文字以上", "英字のみ10文字以上", "英大小文字・数字・記号を組み合わせた8文字以上", "生年月日等の覚えやすいものでよい"],
    answer: 2,
    exp: "第15条に「パスワードは適切な強度（英大小文字・数字・記号を組み合わせた8文字以上）で設定する」と定められています。推測されやすいパスワードは厳禁です。"
  },
  {
    q: "Q16. テレワーク時のネットワーク接続について正しいものはどれですか？",
    choices: ["近くの公衆Wi-Fiを自由に使ってよい", "会社指定のVPNを経由して業務システムに接続する", "スマートフォンのテザリングは禁止されている", "自宅Wi-Fiは暗号化不要"],
    answer: 1,
    exp: "第15条に「テレワーク時は会社指定のVPNを経由して業務システムに接続する」と定められています。また「公衆Wi-Fi（カフェ・空港等）への直接接続は禁止」「自宅Wi-FiはWPA2以上の暗号化が必要」とも規定されています。"
  },
  {
    q: "Q17. USBメモリ等の外部記憶媒体の使用について正しいものはどれですか？",
    choices: ["管理者の承認があれば使用できる", "容量が4GB以下なら使用できる", "私用のもののみ禁止", "接続は禁止されている"],
    answer: 3,
    exp: "第15条に「USBメモリ等の外部記憶媒体の接続は禁止する」と定められています。承認があっても使用できません。情報漏えいのリスクを防ぐための重要なルールです。"
  },
  {
    q: "Q18. インシデントの「重大」分類に該当するものはどれですか？",
    choices: ["すぐに回収できた誤送信メール", "パスワードの誤設定", "少数の個人情報漏えいのおそれ", "個人情報の大規模漏えい・不正アクセスによるシステム停止"],
    answer: 3,
    exp: "第17条に「【重大】：個人情報の大規模漏えい・不正アクセスによるシステム停止等」と定められています。「誤送信（即時回収可能）」「パスワードの誤設定」は【軽微】、「少数の個人情報漏えいのおそれ・マルウェア感染」は【中程度】です。"
  },
  {
    q: "Q19. 重大・中程度インシデントが発生した場合、個人情報保護委員会への速報は何時間以内に行う必要がありますか？",
    choices: ["24時間以内", "48時間以内", "72時間以内", "1週間以内"],
    answer: 2,
    exp: "第18条第3項に「個人情報保護委員会（改正個人情報保護法に基づく報告義務。発生から72時間以内に速報）」と定められています。これは法律上の義務です。"
  },
  {
    q: "Q20. インシデントを発見した際、最初に報告すべき相手はどこですか？",
    choices: ["個人情報保護委員会（行政機関）", "警察署", "管理者（個人情報保護管理者）", "直属の上司（必ずしも管理者でない場合）"],
    answer: 2,
    exp: "第18条第1項に「インシデントを発見した者は、直ちに管理者へ報告する」と定められています。管理者が報告を受けた後、代表取締役や外部機関（個人情報保護委員会・警察等）への報告判断を行います。"
  }
];

let current = 0, score = 0, answers = [], answered = false;


function startQuiz() {
  current = 0; score = 0; answers = [];
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('sender-name').value = '';
  document.getElementById('extra-email').value = '';
  document.getElementById('send-status').textContent = '';
  document.getElementById('btn-send').disabled = false;
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  updateProgress();
  const area = document.getElementById('quiz-area');
  area.innerHTML = '';
  const q = questions[current];
  const card = document.createElement('div');
  card.className = 'q-card active';
  card.innerHTML = `
    <div class="q-header">
      <span>問題 ${current + 1} / ${questions.length}</span>
      <span>全20問</span>
    </div>
    <div class="q-body">
      <div class="q-text">${q.q}</div>
      ${q.choices.map((c, i) => `
        <div class="choice" id="choice-${i}" onclick="selectChoice(${i})">
          <span class="choice-label">${['A','B','C','D'][i]}</span>
          <span>${c}</span>
        </div>`).join('')}
      <div class="explanation" id="explanation">
        <div class="result-label" id="result-label"></div>
        <div id="exp-text"></div>
      </div>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()" disabled>
        ${current === questions.length - 1 ? '結果を見る' : '次の問題へ →'}
      </button>
    </div>`;
  area.appendChild(card);
}

function selectChoice(i) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const correct = q.answer;
  answers.push({ q: current, selected: i, correct: i === correct });
  if (i === correct) score++;
  ['A','B','C','D'].forEach((_, idx) => {
    const el = document.getElementById(`choice-${idx}`);
    if (idx === correct) el.classList.add('correct');
    else if (idx === i) el.classList.add('wrong');
  });
  document.getElementById('explanation').classList.add('show');
  document.getElementById('result-label').innerHTML = i === correct
    ? '<span class="correct-label">✅ 正解！</span>'
    : `<span class="wrong-label">❌ 不正解。正解は【${['A','B','C','D'][correct]}】です。</span>`;
  document.getElementById('exp-text').textContent = q.exp;
  document.getElementById('btn-next').disabled = false;
}

function nextQuestion() {
  current++;
  if (current >= questions.length) showResult();
  else renderQuestion();
}

function updateProgress() {
  document.getElementById('progress-bar').style.width = (current / questions.length * 100) + '%';
  document.getElementById('progress-label').textContent = `${current} / ${questions.length} 問`;
}

function showResult() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('progress-label').textContent = `${questions.length} / ${questions.length} 問`;
  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('score-num').textContent = score;

  const [title, msg] = score === 20
    ? ['🏆 満点！完璧です！', '規定をしっかり理解されています。引き続き実務でも意識して行動しましょう。']
    : score >= 16
    ? ['🎉 優秀な成績です！', '規定の主要な内容を理解できています。間違えた箇所を確認して完璧を目指しましょう。']
    : score >= 12
    ? ['👍 合格ラインです！', '基本的な内容は理解できています。間違えた問題の規定条文を読み直してみましょう。']
    : ['📚 もう一度チャレンジしましょう！', '規定を読み返した後、再度チャレンジしてください。理解を深めることが大切です。'];
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-message').textContent = msg;

  document.getElementById('review-items').innerHTML = answers.map(a =>
    `<div class="review-item">
      <span class="review-icon">${a.correct ? '✅' : '❌'}</span>
      <span>問題 ${a.q + 1}：${questions[a.q].q.replace(/^Q\d+\. /, '')}</span>
    </div>`
  ).join('');
}

async function sendResult() {
  const name = document.getElementById('sender-name').value.trim();
  if (!name) {
    alert('お名前を入力してください。');
    document.getElementById('sender-name').focus();
    return;
  }

  const extraEmail = document.getElementById('extra-email').value.trim();
  const now = new Date();
  const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const evalText = score === 20 ? '満点' : score >= 16 ? '優秀' : score >= 12 ? '合格' : '要再学習';
  const detailLines = answers.map(a => `Q${a.q + 1}：${a.correct ? '○ 正解' : '× 不正解'}`).join('\n');

  const statusEl = document.getElementById('send-status');
  const btnSend = document.getElementById('btn-send');
  statusEl.className = 'send-status status-ing';
  statusEl.textContent = '送信中...';
  btnSend.disabled = true;

  try {
    const res = await fetch('/api/send-result', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_name:   name,
        score:       `${score} / 20点`,
        evaluation:  evalText,
        date:        dateStr,
        details:     detailLines,
        extra_email: extraEmail
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'Server error');
    }
    statusEl.className = 'send-status status-ok';
    statusEl.textContent = '✅ 送信が完了しました。担当者にメールが届いています。';
  } catch (err) {
    statusEl.className = 'send-status status-err';
    statusEl.textContent = '❌ 送信に失敗しました。時間をおいて再度お試しください。';
    btnSend.disabled = false;
    console.error(err);
  }
}

window.onload = startQuiz;
</script>
</body>
</html>
